services:
  db: 
    image: postgres:16-alpine 
    container_name: meu-banco-pg
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fredericksen-net

  api:
    build: 
      context: .
      target: build # <-- INVESTIGAÇÃO: O estágio 'build' no seu Dockerfile tem o 'USER node'?
    container_name: minha-api-nestjs
    # Usamos o UID:GID para evitar ambiguidades em sistemas Linux/WSL
    user: "1000:1000" 
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist # Protege a pasta de build de ser sobrescrita pelo host
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    command: >
      sh -c "npx prisma generate && npm run start:dev"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fredericksen-net

networks:
  fredericksen-net:
    driver: bridge

volumes:
  pgdata:
  dist_data: