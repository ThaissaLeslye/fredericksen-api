name: CD - Fredericksen

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          MY_DOT_ENV: ${{ secrets.DOT_ENV }}
        run: |
          echo "$MY_DOT_ENV" > .env

      - name: Deploy Containers
        run: |
          docker compose up -d --build
          docker image prune -f
        
