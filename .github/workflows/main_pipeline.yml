name: CI/CD - Fredericksen Home

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env for Validation
        env:
          CI_ENV: ${{ secrets.DOT_ENV }}
        run: echo "$CI_ENV" > .env

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint Check
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Unit Tests
        run: npm run test

      - name: Validate Docker Production Build
        run: docker build . --target production

  deploy:
    runs-on: self-hosted
    needs: [quality-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Deploy
        env:
          DEPLOY_ENV: ${{ secrets.DOT_ENV }}
        run: echo "$DEPLOY_ENV" > .env

      - name: Deploy Containers
        run: |
          docker compose up -d --build
          docker image prune -f
