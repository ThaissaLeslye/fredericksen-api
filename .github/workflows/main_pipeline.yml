name: CI/CD - Fredericksen Home

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env for Validation
        env:
          CI_ENV: ${{ secrets.DOT_ENV }}
        run: echo "$CI_ENV" > .env

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint Check
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Unit Tests
        run: npm run test

      - name: Start Containers and Validate Healthcheck
        run: |
          docker compose up -d --build api

          echo "Aguardando inicialização dos containers e validação do Healthcheck..."
          for i in {1..12}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' minha-api-nestjs 2>/dev/null || echo "starting")
            echo "Status atual do container: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Sucesso: O container foi validado e está totalmente saudável!"
              exit 0
            fi
            sleep 5
          done

          echo "ERRO: O container não ficou saudável dentro do tempo limite."
          echo "=== Logs da API ==="
          docker compose logs api
          echo "=== Estado do Docker ==="
          docker inspect minha-api-nestjs
          exit 1

      - name: Stop Containers
        if: always()
        run: docker compose down

  deploy:
    runs-on: self-hosted
    needs: [quality-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Deploy
        env:
          DEPLOY_ENV: ${{ secrets.DOT_ENV }}
        run: echo "$DEPLOY_ENV" > .env

      - name: Deploy Containers
        run: |
          docker compose up -d --build
          docker image prune -f
